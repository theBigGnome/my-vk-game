<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match 3 Evolution VK</title>
    <!-- Исправленный путь к VK Bridge -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { --cell-size: 55px; }
        @media (max-width: 600px) { :root { --cell-size: 11vw; } }
        body { display: flex; justify-content: center; align-items: flex-start; height: 100vh; margin: 0; background: #0a0a0a; font-family: sans-serif; color: white; touch-action: manipulation; overflow: hidden; padding-top: 20px; }
        .game-container { display: flex; flex-direction: column; align-items: center; }
        #grid { display: grid; grid-template-columns: repeat(8, var(--cell-size)); gap: 5px; background: #222; padding: 10px; border-radius: 12px; border: 3px solid #444; position: relative; }
        .cell { width: var(--cell-size); height: var(--cell-size); border-radius: 10px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); border: 2px solid transparent; box-sizing: border-box; position: relative; }
        .selected { border-color: white !important; transform: scale(1.1); z-index: 10; box-shadow: 0 0 15px white; }
        
        .c0 { background: #ff595e; } .c1 { background: #ffca3a; } .c2 { background: #8ac926; } .c3 { background: #1982c4; } .c4 { background: #6a4c93; }
        .empty { opacity: 0; transform: scale(0); }

        .super::before { content: ''; position: absolute; top: 45%; left: 15%; width: 70%; height: 10%; background: white; box-shadow: 0 0 8px white; }
        .super::after { content: ''; position: absolute; left: 45%; top: 15%; width: 10%; height: 70%; background: white; box-shadow: 0 0 8px white; }
        
        .rainbow { background: linear-gradient(45deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f) !important; background-size: 200% 200% !important; animation: rb 2s linear infinite; border: 2px solid white !important; border-radius: 50% !important; }
        @keyframes rb { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .stats { margin-bottom: 15px; text-align: center; min-width: 280px; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 250px; }
        button.primary { width: 100%; padding: 15px; background: #4986cc; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<script>
    // 1. Инициализация VK Bridge
    vkBridge.send("VKWebAppInit")
        .then(data => {
            console.log("VK Bridge initialized");
            // Настраиваем внешний вид (черная тема под игру)
            vkBridge.send("VKWebAppSetViewSettings", {
                "status_bar_style": "light",
                "action_bar_color": "#0a0a0a"
            });
        })
        .catch(e => console.log("Запущено вне ВК или ошибка инициализации"));

    // Функция для вибрации (Taptic Engine)
    function vibrate(type = 'light') {
        vkBridge.send("VKWebAppTapticNotificationOccurred", {"type": type}).catch(() => {});
    }

    // Функция показа рекламы (межстраничная)
    function showAds() {
        vkBridge.send("VKWebAppShowNativeAds", {ad_format:"interstitial"})
            .then(data => console.log("Реклама просмотрена"))
            .catch(error => console.log("Ошибка рекламы", error));
    }

    // Функция поделиться результатом
    function shareScore(points) {
        vkBridge.send("VKWebAppShowWallPostBox", {
            "message": `Я набрал ${points} очков в Match 3 Evolution! Попробуй побить мой рекорд! 🎮`,
            "attachments": "https://vk.com" 
        });
    }
</script>

<div id="overlay">
    <div class="modal">
        <h2 style="color:#4986cc; margin-top:0">MATCH 3 VK</h2>
        <button class="primary" onclick="startGame()">НАЧАТЬ</button>
        <p style="font-size: 10px; color: #666;">Версия с VK Bridge</p>
    </div>
</div>

<div class="game-container">
    <div class="stats">
        <div style="font-size: 24px; margin-bottom: 10px;">Счет: <b id="score">0</b></div>
        <button onclick="location.reload()" style="background:#333; border:1px solid #444; color:#ccc; padding:6px 12px; border-radius:5px; font-size:12px; cursor:pointer;">РЕСТАРТ</button>
    </div>
    <div id="grid"></div>
</div>

<script>
    const SIZE = 8, COLORS = 5;
    let gridData = [], gridTypes = [], cells = [], score = 0, selected = null, busy = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSnd(f, type='sine', dur=0.3) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.connect(g); g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        o.start(); o.stop(audioCtx.currentTime + dur);
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        initBoard();
    }

    function initBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = ''; gridData = []; gridTypes = []; cells = []; score = 0;
        document.getElementById('score').innerText = 0;
        for (let i = 0; i < SIZE * SIZE; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell'; cell.onclick = () => handleMove(i);
            grid.appendChild(cell); cells.push(cell);
            let r = Math.floor(i / SIZE), c = i % SIZE, col;
            do { col = Math.floor(Math.random() * COLORS); } 
            while ((c >= 2 && gridData[i-1] === col && gridData[i-2] === col) || (r >= 2 && gridData[i-SIZE] === col && gridData[i-SIZE*2] === col));
            gridData[i] = col; gridTypes[i] = 'normal';
        }
        render();
    }

    function render() {
        gridData.forEach((col, i) => {
            if (col === null) cells[i].className = 'cell empty';
            else {
                let typeClass = gridTypes[i] === 'super' ? ' super' : (gridTypes[i] === 'rainbow' ? ' rainbow' : '');
                cells[i].className = `cell c${col}${typeClass}`;
            }
        });
    }

    function handleMove(idx) {
        if (busy || gridData[idx] === null) return;
        if (selected === null) {
            selected = idx; 
            cells[idx].classList.add('selected'); 
            playSnd(600);
            vibrate('light'); // Добавили вибрацию при выборе
        } else {
            let id1 = selected, id2 = idx;
            let isAdj = [1, -1, SIZE, -SIZE].includes(id1 - id2) && (Math.abs(id1 - id2) !== 1 || Math.floor(id1 / SIZE) === Math.floor(id2 / SIZE));
            cells[selected].classList.remove('selected');
            if (isAdj) {
                // Если есть совпадение, можно вибрировать сильнее ('success')
                vibrate('medium'); 
                const sType = gridTypes[id1], tType = gridTypes[id2];
                // ... (логика свапа и радуги как в оригинале) ...
                if (sType === 'rainbow' || tType === 'rainbow') {
                    // execRainbow... (твой код ниже)
                }
                swap(id1, id2);
                if (!checkMatches(true)) {
                    busy = true; render();
                    setTimeout(() => { swap(id1, id2); render(); busy = false; }, 300);
                } else render();
            } else {
                selected = idx; cells[idx].classList.add('selected'); playSnd(600);
                return;
            }
            selected = null;
        }
    }

    // В функцию начисления очков можно добавить вызов рекламы раз в 5000 очков
    function updateScore(pts) {
        score += pts;
        document.getElementById('score').innerText = score;
        if (score > 0 && score % 5000 === 0) showAds(); // Рекламная пауза
    }

    // Далее идет твоя логика функций swap, checkMatches и т.д.
    // Просто не забудь заменить score += на updateScore(pts) внутри логики уничтожения фишек.
</script>
</body>
</html>
