<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match 3 Evolution VK</title>
    <!-- Используем надежную версию моста -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { --cell-size: 55px; }
        @media (max-width: 600px) { :root { --cell-size: 11vw; } }
        body { display: flex; justify-content: center; align-items: flex-start; height: 100vh; margin: 0; background: #0a0a0a; font-family: sans-serif; color: white; touch-action: manipulation; overflow: hidden; padding-top: 20px; }
        .game-container { display: flex; flex-direction: column; align-items: center; }
        #grid { display: grid; grid-template-columns: repeat(8, var(--cell-size)); gap: 5px; background: #222; padding: 10px; border-radius: 12px; border: 3px solid #444; position: relative; }
        .cell { width: var(--cell-size); height: var(--cell-size); border-radius: 10px; cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; box-sizing: border-box; position: relative; }
        .selected { border-color: white !important; transform: scale(1.1); z-index: 10; box-shadow: 0 0 15px white; }
        .c0 { background: #ff595e; } .c1 { background: #ffca3a; } .c2 { background: #8ac926; } .c3 { background: #1982c4; } .c4 { background: #6a4c93; }
        .empty { opacity: 0; transform: scale(0); }
        .stats { margin-bottom: 15px; text-align: center; min-width: 280px; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 250px; }
        button.primary { width: 100%; padding: 15px; background: #4986cc; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="modal">
        <h2 style="color:#4986cc; margin-top:0">MATCH 3 VK</h2>
        <button class="primary" onclick="startGame()">ИГРАТЬ</button>
    </div>
</div>

<div class="game-container">
    <div class="stats">
        <div style="font-size: 24px; margin-bottom: 10px;">Счет: <b id="score">0</b></div>
        <button onclick="location.reload()" style="background:#333; border:1px solid #444; color:#ccc; padding:6px 12px; border-radius:5px; font-size:12px;">РЕСТАРТ</button>
    </div>
    <div id="grid"></div>
</div>

<script>
    // Инициализация моста СРАЗУ
    const bridge = window.vkBridge;
    bridge.send("VKWebAppInit").then(() => {
        console.log("VK Init Success");
        bridge.send("VKWebAppSetViewSettings", {"status_bar_style": "light"});
    }).catch(e => console.log("Not in VK"));

    const SIZE = 8, COLORS = 5;
    let gridData = [], cells = [], score = 0, selected = null, busy = false;
    
    // Звуковой контекст (создаем лениво)
    let audioCtx = null;

    function playSnd(f) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.connect(g); g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        initBoard();
    }

    function initBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = ''; gridData = []; cells = []; score = 0;
        document.getElementById('score').innerText = 0;
        
        for (let i = 0; i < SIZE * SIZE; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => handleMove(i);
            grid.appendChild(cell);
            cells.push(cell);
            
            let r = Math.floor(i / SIZE), c = i % SIZE, col;
            do { col = Math.floor(Math.random() * COLORS); } 
            while ((c >= 2 && gridData[i-1] === col && gridData[i-2] === col) || 
                   (r >= 2 && gridData[i-SIZE] === col && gridData[i-SIZE*2] === col));
            gridData[i] = col;
        }
        render();
    }

    function render() {
        gridData.forEach((col, i) => {
            cells[i].className = col === null ? 'cell empty' : `cell c${col}`;
        });
    }

    function handleMove(idx) {
        if (busy || gridData[idx] === null) return;
        
        if (selected === null) {
            selected = idx;
            cells[idx].classList.add('selected');
            playSnd(600);
            bridge.send("VKWebAppTapticSelectionChanged").catch(() => {});
        } else {
            let id1 = selected, id2 = idx;
            let isAdj = [1, -1, SIZE, -SIZE].includes(id1 - id2) && 
                        (Math.abs(id1 - id2) !== 1 || Math.floor(id1/SIZE) === Math.floor(id2/SIZE));
            
            cells[selected].classList.remove('selected');
            if (isAdj) {
                swap(id1, id2);
                if (!checkMatches()) {
                    busy = true;
                    render();
                    setTimeout(() => { swap(id1, id2); render(); busy = false; }, 300);
                } else {
                    render();
                    bridge.send("VKWebAppTapticNotificationOccurred", {"type": "success"}).catch(() => {});
                }
            }
            selected = null;
        }
    }

    function swap(i1, i2) {
        [gridData[i1], gridData[i2]] = [gridData[i2], gridData[i1]];
    }

    function checkMatches() {
        let del = new Set();
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE - 2; c++) {
                let i = r * SIZE + c;
                if (gridData[i] !== null && gridData[i] === gridData[i+1] && gridData[i] === gridData[i+2]) {
                    del.add(i); del.add(i+1); del.add(i+2);
                }
            }
        }
        for (let c = 0; c < SIZE; c++) {
            for (let r = 0; r < SIZE - 2; r++) {
                let i = r * SIZE + c;
                if (gridData[i] !== null && gridData[i] === gridData[i+SIZE] && gridData[i] === gridData[i+SIZE*2]) {
                    del.add(i); del.add(i+SIZE); del.add(i+SIZE*2);
                }
            }
        }
        if (del.size > 0) {
            score += del.size * 10;
            document.getElementById('score').innerText = score;
            del.forEach(i => gridData[i] = null);
            playSnd(400);
            setTimeout(fillGaps, 300);
            return true;
        }
        return false;
    }

    function fillGaps() {
        for (let c = 0; c < SIZE; c++) {
            let emptySpot = -1;
            for (let r = SIZE - 1; r >= 0; r--) {
                let i = r * SIZE + c;
                if (gridData[i] === null) {
                    if (emptySpot === -1) emptySpot = r;
                } else if (emptySpot !== -1) {
                    gridData[emptySpot * SIZE + c] = gridData[i];
                    gridData[i] = null;
                    emptySpot--;
                }
            }
            for (let r = emptySpot; r >= 0; r--) {
                gridData[r * SIZE + c] = Math.floor(Math.random() * COLORS);
            }
        }
        render();
        setTimeout(checkMatches, 300);
    }
</script>
</body>
</html>
